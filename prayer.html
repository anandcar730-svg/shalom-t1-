<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prayer Request - Shalom Church</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#0b0b0b;
  color:white;
}

/* NAVBAR */
nav{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
  background:rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  z-index:1000;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  width:40px;
  border-radius:50%;
}

nav a{
  color:white;
  margin:0 10px;
  text-decoration:none;
  transition:0.3s;
}

nav a:hover{
  color:#00ffd5;
}

/* SECTION */
.section{
  padding:120px 20px 80px;
  text-align:center;
}

.container{
  max-width:600px;
  margin:auto;
}

/* FORM */
form{
  margin-top:30px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

input, textarea, select{
  padding:12px;
  border:none;
  border-radius:8px;
  outline:none;
  background:#111;
  color:white;
}

textarea{
  min-height:120px;
}

button{
  padding:12px;
  background:#00ffd5;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:0.8;
}

/* STATUS MESSAGE */
#status{
  margin-top:15px;
  font-size:14px;
}

/* FOOTER */
footer{
  background:#000;
  padding:30px;
  text-align:center;
}

/* MOBILE */
@media(max-width:768px){
  nav{
    flex-direction:column;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <div class="logo">
    <img src="assets/images/logo.png" alt="logo">
    <h2>SHALOM</h2>
  </div>

  <div>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="campuses.html">Campuses</a>
    <a href="prayer.html">Prayer</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<!-- FORM SECTION -->
<section class="section">
  <div class="container">
    <h1>Prayer Request</h1>
    <p style="margin-top:10px;">Submit your prayer request and our team will pray for you.</p>

    <form id="prayerForm">
      <input type="text" id="name" placeholder="Your Name" required>
      <input type="text" id="phone" placeholder="Phone Number">

      <select id="campus">
        <option>Trivandrum</option>
        <option>Kollam</option>
        <option>Neyyattinkara</option>
      </select>

      <textarea id="request" placeholder="Your Prayer Request" required></textarea>

      <button type="submit">Submit Prayer 🙏</button>
    </form>

    <div id="status"></div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 Shalom Church</p>
</footer>

<script>
// 🔴 IMPORTANT: Replace with your Google Apps Script URL
const API_URL = "https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec";

document.getElementById("prayerForm").addEventListener("submit", function(e){
  e.preventDefault();

  const status = document.getElementById("status");
  status.innerText = "Submitting...";

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      type: "prayer",
      name: document.getElementById("name").value,
      phone: document.getElementById("phone").value,
      campus: document.getElementById("campus").value,
      request: document.getElementById("request").value
    })
  })
  .then(res => res.text())
  .then(() => {
    status.innerText = "Prayer submitted successfully 🙏";
    document.getElementById("prayerForm").reset();
  })
  .catch(() => {
    status.innerText = "Error submitting. Try again.";
  });
});
</script>

</body>
</html>
